<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Link v1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.js"></script>
    <style>
        .glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
        canvas { filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.5)); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col items-center py-10 px-4 font-sans">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">SONIC LINK</h1>
        <p class="text-slate-500 mt-2">Data transfer via near-ultrasonic sound</p>
    </header>

    <main class="w-full max-w-2xl grid gap-6">
        <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6 glow">
            <div class="flex justify-between items-center mb-4 gap-4 flex-wrap">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Spectrum Analyzer</span>
                <span id="hzDisplay" class="text-xs font-mono text-cyan-400">0Hz - 24kHz</span>
            </div>
            <canvas id="visualizer" class="w-full h-32 bg-black/20 rounded-xl"></canvas>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6">
            <label for="protocolSelect" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Protocol</label>
            <select id="protocolSelect" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none">
                <option value="1">Audible Fast (best for testing)</option>
                <option value="0">Audible Normal</option>
                <option value="4">Ultrasound Fast</option>
                <option value="3">Ultrasound Normal</option>
            </select>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <section class="bg-slate-800 border border-slate-700 rounded-3xl p-6 flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-400 rounded-full"></span> Send
                </h2>
                <textarea id="txData" placeholder="Enter message to beam..." 
                    class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none h-24 mb-4 resize-none">hello</textarea>
                <button id="txBtn" onclick="onSend()" class="mt-auto bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all active:scale-95" disabled>
                    Broadcast Pulse
                </button>
            </section>

            <section class="bg-slate-800 border border-slate-700 rounded-3xl p-6 flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> Receive
                </h2>
                <div id="rxOutput" class="bg-black/40 border border-slate-700 rounded-xl p-3 h-24 overflow-y-auto text-emerald-400 font-mono text-sm break-all mb-4">
                    Waiting for signal...
                </div>
                <button id="rxBtn" onclick="toggleReceiver()" class="mt-auto bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition-all" disabled>
                    Start Listening
                </button>
            </section>
        </div>
    </main>

    <footer id="status" class="mt-10 text-xs text-slate-600 font-mono uppercase tracking-widest text-center">
        Engine Offline
    </footer>

    <script>
        let ggwaveModule = null;
        let ggwaveInstance = null;
        let audioCtx = null;
        let analyser = null;
        let isListening = false;
        let sourceNode = null;
        let processorNode = null;
        let mediaStream = null;
        let animationId = null;

        function setStatus(text) {
            document.getElementById('status').innerText = text;
        }

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.75;
                drawSpectrum();
            }

            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
        }

        async function initEngine() {
            await initAudio();

            if (ggwaveInstance) {
                return;
            }

            setStatus('Loading modem...');

            const factoryConfig = {
                locateFile: (path) => path.endsWith('.wasm')
                    ? 'https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.wasm'
                    : path
            };

            ggwaveModule = await ggwave_factory(factoryConfig);
            const params = ggwaveModule.getDefaultParameters();
            params.sampleRateInp = audioCtx.sampleRate;
            params.sampleRateOut = audioCtx.sampleRate;
            ggwaveInstance = ggwaveModule.init(params);

            document.getElementById('txBtn').disabled = false;
            document.getElementById('rxBtn').disabled = false;
            setStatus(`Engine Ready @ ${audioCtx.sampleRate} Hz`);
        }

        async function onSend() {
            await initEngine();

            const text = document.getElementById('txData').value.trim();
            if (!text) {
                setStatus('Enter a short message first');
                return;
            }

            const protocol = parseInt(document.getElementById('protocolSelect').value, 10);
            const payload = ggwaveModule.encode(ggwaveInstance, text, protocol, 15);
            const buffer = audioCtx.createBuffer(1, payload.length, audioCtx.sampleRate);
            buffer.getChannelData(0).set(payload);

            const txSource = audioCtx.createBufferSource();
            txSource.buffer = buffer;
            txSource.connect(audioCtx.destination);
            txSource.connect(analyser);
            txSource.start();

            setStatus(`Broadcasting with protocol ${protocol}...`);
            txSource.onended = () => setStatus('Pulse Sent');
        }

        async function toggleReceiver() {
            if (isListening) {
                stopReceiver();
                return;
            }

            await initEngine();

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });

                sourceNode = audioCtx.createMediaStreamSource(mediaStream);
                processorNode = audioCtx.createScriptProcessor(1024, 1, 1);

                sourceNode.connect(analyser);
                sourceNode.connect(processorNode);
                processorNode.connect(audioCtx.destination);

                processorNode.onaudioprocess = (event) => {
                    const inputData = event.inputBuffer.getChannelData(0);
                    const result = ggwaveModule.decode(ggwaveInstance, inputData);

                    if (result) {
                        addMessage(result);
                    }
                };

                isListening = true;
                document.getElementById('rxBtn').innerText = 'Stop Listening';
                document.getElementById('rxBtn').classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
                document.getElementById('rxBtn').classList.add('bg-red-600', 'hover:bg-red-500');
                setStatus('Listening for signal...');
            } catch (error) {
                setStatus(`Mic Error: ${error.message}`);
            }
        }

        function stopReceiver() {
            if (processorNode) {
                processorNode.disconnect();
                processorNode.onaudioprocess = null;
                processorNode = null;
            }

            if (sourceNode) {
                sourceNode.disconnect();
                sourceNode = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach((track) => track.stop());
                mediaStream = null;
            }

            isListening = false;
            document.getElementById('rxBtn').innerText = 'Start Listening';
            document.getElementById('rxBtn').classList.remove('bg-red-600', 'hover:bg-red-500');
            document.getElementById('rxBtn').classList.add('bg-emerald-600', 'hover:bg-emerald-500');
            setStatus('Receiver Stopped');
        }

        function addMessage(result) {
            const text = typeof result === 'string' ? result : new TextDecoder().decode(result);
            const output = document.getElementById('rxOutput');

            if (output.innerText.includes('Waiting for signal...')) {
                output.innerHTML = '';
            }

            const row = document.createElement('div');
            row.className = 'mb-1 border-b border-white/5 pb-1';
            row.textContent = `> ${text}`;
            output.prepend(row);
        }

        function drawSpectrum() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');

            function render() {
                animationId = requestAnimationFrame(render);

                const width = Math.max(1, Math.floor(canvas.clientWidth));
                const height = Math.max(1, Math.floor(canvas.clientHeight));
                if (canvas.width !== width || canvas.height !== height) {
                    canvas.width = width;
                    canvas.height = height;
                }

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height;
                    const r = 34;
                    const g = i > bufferLength * 0.7 ? 211 : 100;
                    const b = 238;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }

            render();
        }


        setStatus('Tap Send or Start Listening to initialize audio');
    </script>
</body>
</html>
