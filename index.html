<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sonic Link</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="app.css">
    <script src="shared.app.js" defer></script>
    <script src="setup.app.js" defer></script>
</head>
<body class="simple-body">
    <main class="landing">
        <section class="landing-copy">
            <p class="mini-label">Open Source Audio Chat</p>
            <h1 class="landing-title">Sonic Link</h1>
            <p class="landing-text">
                A lightweight nearby messenger that sends short text over sound.
            </p>
        </section>

        <section class="simple-card landing-card">
            <form id="setupForm" class="simple-form">
                <label class="simple-field">
                    <span class="simple-label">Display Name</span>
                    <input id="callsignInput" class="simple-input" type="text" maxlength="16" placeholder="Ghost-407">
                </label>

                <label class="simple-field">
                    <span class="simple-label">Transmission Mode</span>
                    <select id="protocolSelect" class="simple-input">
                        <option value="1">Audible Fast</option>
                        <option value="0">Audible Normal</option>
                        <option value="4">Ultrasound Fast</option>
                        <option value="3">Ultrasound Normal</option>
                    </select>
                </label>

                <div class="simple-note compact-note">
                    <strong id="summaryBudget">140-byte packet limit</strong>
                    <p id="budgetNote">Short messages transmit more reliably.</p>
                </div>

                <label class="simple-toggle" for="autoReceiveInput">
                    <div>
                        <span class="simple-label">Enable Receiving</span>
                        <p class="simple-status">Start the receiver as soon as chat opens.</p>
                    </div>
                    <input id="autoReceiveInput" type="checkbox" checked>
                </label>

                <div class="simple-actions">
                    <button type="submit" class="primary-btn">Go to Chat</button>
                    <button id="resetBtn" type="button" class="secondary-btn">Reset</button>
                </div>
            </form>

            <p id="setupStatus" class="simple-status">Saved locally on this device.</p>
        </section>
    </main>
</body>
</html>
