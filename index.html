<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Link</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.v2.css">
    <script src="shared.v2.js" defer></script>
    <script src="setup.v2.js" defer></script>
</head>
<body class="simple-body">
    <main class="landing">
        <section class="landing-copy">
            <p class="mini-label">Sonic Link</p>
            <h1 class="landing-title">Chat through sound.</h1>
            <p class="landing-text">
                Pick a name, choose the audio mode, and jump into a simple chat screen.
            </p>
        </section>

        <section class="simple-card">
            <form id="setupForm" class="simple-form">
                <label class="simple-field">
                    <span class="simple-label">Your name</span>
                    <input id="callsignInput" class="simple-input" type="text" maxlength="16" placeholder="Ghost-407">
                </label>

                <label class="simple-field">
                    <span class="simple-label">Audio mode</span>
                    <select id="protocolSelect" class="simple-input">
                        <option value="1">Audible Fast</option>
                        <option value="0">Audible Normal</option>
                        <option value="4">Ultrasound Fast</option>
                        <option value="3">Ultrasound Normal</option>
                    </select>
                </label>

                <div class="simple-note">
                    <strong id="summaryBudget">140 byte radio budget</strong>
                    <p id="budgetNote">Keep messages short so the modem can send them cleanly.</p>
                </div>

                <div class="simple-actions">
                    <button type="submit" class="primary-btn">Start Chat</button>
                    <button id="resetBtn" type="button" class="secondary-btn">Reset</button>
                </div>
            </form>

            <p id="setupStatus" class="simple-status">Settings are saved on this device.</p>
        </section>
    </main>
</body>
</html>
