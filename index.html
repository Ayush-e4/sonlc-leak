<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Link | Protocol Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.js"></script>
</head>
<body class="bg-[#0b0f1a] text-slate-200 min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="max-w-md w-full space-y-6">
        <div class="text-center">
            <h1 class="text-4xl font-black text-cyan-400 tracking-tighter">SONIC LINK</h1>
            <p id="engineStatus" class="text-[10px] font-mono text-rose-500 mt-2 uppercase font-bold tracking-widest">Engine Offline</p>
        </div>

        <div id="debugLog" class="bg-black/60 border border-slate-800 rounded-xl p-3 h-24 overflow-y-auto text-[10px] font-mono text-slate-500">
            <div>[System] Ready for Handshake.</div>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl">
                <input id="txData" type="text" value="Hello" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm mb-4 outline-none focus:border-cyan-500">
                <button id="sendBtn" onclick="onSend()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all disabled:opacity-50">
                    Broadcast Silently
                </button>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl">
                <div id="rxOutput" class="bg-black/40 rounded-lg p-4 h-20 mb-4 text-emerald-400 font-mono text-sm flex items-center justify-center italic border border-slate-800">
                    Waiting for signal...
                </div>
                <button id="rxBtn" onclick="toggleReceiver()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition-all">
                    Start Listening
                </button>
            </div>
        </div>
    </div>

    <script>
        let ggwave = null;
        let audioCtx = null;
        let isListening = false;

        function log(msg) {
            const container = document.getElementById('debugLog');
            const entry = document.createElement('div');
            entry.innerText = `> ${msg}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        const factoryConfig = {
            locateFile: (path) => {
                if (path.endsWith('.wasm')) {
                    return 'https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.wasm';
                }
                return path;
            }
        };

        // Initialize Engine
        ggwave_factory(factoryConfig).then(obj => {
            ggwave = obj;
            document.getElementById('engineStatus').innerText = "📡 Engine Online";
            document.getElementById('engineStatus').classList.replace('text-rose-500', 'text-emerald-500');
            log("WASM Loaded Successfully.");
        });

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 48000});
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        async function onSend() {
            if (!ggwave) return log("Wait for engine...");
            await initAudio();
            
            const rawText = document.getElementById('txData').value || "Hello";
            
            try {
                // THE FIX: Use TextEncoder to convert string to Uint8Array
                // This prevents the "non-string to std::string" binding error
                const encoder = new TextEncoder();
                const textBuffer = encoder.encode(String(rawText));
                
                log(`Broadcasting: ${rawText}`);

                // Try the 4-argument call first, fallback to 3 if needed
                let payload;
                try {
                    payload = ggwave.encode(textBuffer, 4, 15, false);
                } catch (e) {
                    payload = ggwave.encode(textBuffer, 4, 15);
                }
                
                const buffer = audioCtx.createBuffer(1, payload.length, 48000);
                buffer.getChannelData(0).set(payload);

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start();
                log("Pulse sent via airwaves.");
            } catch (e) {
                log("Critical Error: " + e.message);
                console.error("Binding Error Detail:", e);
            }
        }

        async function toggleReceiver() {
            if (isListening) return location.reload();
            if (!ggwave) return log("Wait for engine...");
            await initAudio();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(1024, 1, 1);

                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const result = ggwave.decode(inputData);
                    if (result) {
                        // The engine might return a Uint8Array or a String
                        let decodedText = result;
                        if (result instanceof Uint8Array) {
                            decodedText = new TextDecoder().decode(result);
                        }
                        
                        log("Signal Decoded!");
                        document.getElementById('rxOutput').innerText = decodedText;
                        document.getElementById('rxOutput').classList.remove('italic');
                    }
                };

                isListening = true;
                document.getElementById('rxBtn').innerText = "Stop Listening";
                document.getElementById('rxBtn').classList.replace('bg-emerald-600', 'bg-red-600');
                document.getElementById('rxOutput').innerText = "Listening...";
                log("Mic Active.");
            } catch (err) {
                log("Mic Access Denied.");
            }
        }
    </script>
</body>
</html>
