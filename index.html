<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Link v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ggwave@0.4.0/ggwave.min.js"></script>
    <style>
        .glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
        canvas { filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.5)); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col items-center py-10 px-4 font-sans">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">SONIC LINK</h1>
        <p class="text-slate-500 mt-2">Data transfer via near-ultrasonic sound</p>
    </header>

    <main class="w-full max-w-2xl grid gap-6">
        
        <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6 glow">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Spectrum Analyzer</span>
                <span id="hzDisplay" class="text-xs font-mono text-cyan-400">0Hz - 24kHz</span>
            </div>
            <canvas id="visualizer" class="w-full h-32 bg-black/20 rounded-xl"></canvas>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <section class="bg-slate-800 border border-slate-700 rounded-3xl p-6 flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-400 rounded-full"></span> Send
                </h2>
                <textarea id="txData" placeholder="Enter message to beam..." 
                    class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none h-24 mb-4 resize-none"></textarea>
                <button onclick="onSend()" class="mt-auto bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all active:scale-95">
                    Broadcast Pulse
                </button>
            </section>

            <section class="bg-slate-800 border border-slate-700 rounded-3xl p-6 flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> Receive
                </h2>
                <div id="rxOutput" class="bg-black/40 border border-slate-700 rounded-xl p-3 h-24 overflow-y-auto text-emerald-400 font-mono text-sm break-all mb-4">
                    Waiting for signal...
                </div>
                <button id="rxBtn" onclick="toggleReceiver()" class="mt-auto bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition-all">
                    Start Listening
                </button>
            </section>
        </div>

    </main>

    <footer id="status" class="mt-10 text-xs text-slate-600 font-mono uppercase tracking-widest">
        Engine Offline
    </footer>

    <script>
        let ggwave = null;
        let audioCtx = null;
        let isListening = false;
        let analyser = null;
        let animationId = null;

        // 1. Load GGWave Factory
        ggwave_factory().then(obj => {
            ggwave = obj;
            document.getElementById('status').innerText = "Engine Ready";
        });

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                drawSpectrum();
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        // --- BROADCAST LOGIC ---
        async function onSend() {
            await initAudio();
            const text = document.getElementById('txData').value;
            if(!text) return;

            // Protocol 4 = [MT] Ultrasound (Fastest/Silent)
            const payload = ggwave.encode(text, 4, 15);
            
            const buffer = audioCtx.createBuffer(1, payload.length, 48000);
            buffer.getChannelData(0).set(payload);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.connect(analyser); // Visualize the outbound signal
            source.start();
            document.getElementById('status').innerText = "Broadcasting...";
            source.onended = () => document.getElementById('status').innerText = "Pulse Sent";
        }

        // --- RECEIVER LOGIC ---
        async function toggleReceiver() {
            if (isListening) {
                location.reload(); // Simplest way to kill the stream for a demo
                return;
            }
            await initAudio();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(1024, 1, 1);

                source.connect(analyser);
                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const result = ggwave.decode(inputData);
                    if (result) {
                        const div = document.createElement('div');
                        div.className = "mb-1 border-b border-white/5 pb-1";
                        div.innerText = `> ${result}`;
                        const out = document.getElementById('rxOutput');
                        out.prepend(div);
                    }
                };

                isListening = true;
                document.getElementById('rxBtn').innerText = "Stop Listening";
                document.getElementById('rxBtn').classList.replace('bg-emerald-600', 'bg-red-600');
            } catch (err) {
                alert("Mic access required for receiving!");
            }
        }

        // --- VISUALIZER LOGIC ---
        function drawSpectrum() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function render() {
                animationId = requestAnimationFrame(render);
                analyser.getByteFrequencyData(dataArray);

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height;
                    // Color shifts to cyan for the high-frequency range
                    const r = 34;
                    const g = i > bufferLength * 0.7 ? 211 : 100;
                    const b = 238;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            render();
        }
    </script>
</body>
</html>
