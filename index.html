<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Link v1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.js"></script>
    <style>
        .glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
        canvas { filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.5)); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col items-center py-10 px-4 font-sans">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">SONIC LINK</h1>
        <p class="text-slate-500 mt-2">Data transfer via near-ultrasonic sound</p>
    </header>

    <main class="w-full max-w-2xl grid gap-6">
        <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6 glow">
            <div class="flex justify-between items-center mb-4 gap-4 flex-wrap">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Spectrum Analyzer</span>
                <span id="hzDisplay" class="text-xs font-mono text-cyan-400">0Hz - 24kHz</span>
            </div>
            <canvas id="visualizer" class="w-full h-32 bg-black/20 rounded-xl"></canvas>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6">
            <label for="protocolSelect" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Protocol</label>
            <select id="protocolSelect" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none">
                <option value="1">Audible Fast (best for testing)</option>
                <option value="0">Audible Normal</option>
                <option value="4">Ultrasound Fast</option>
                <option value="3">Ultrasound Normal</option>
            </select>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <section class="bg-slate-800 border border-slate-700 rounded-3xl p-6 flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-400 rounded-full"></span> Send
                </h2>
                <textarea id="txData" placeholder="Enter message to beam..." 
                    class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none h-24 mb-4 resize-none">hello</textarea>
                <button id="txBtn" onclick="onSend()" class="mt-auto bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all active:scale-95">
                    Broadcast Pulse
                </button>
            </section>

            <section class="bg-slate-800 border border-slate-700 rounded-3xl p-6 flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> Receive
                </h2>
                <div id="rxOutput" class="bg-black/40 border border-slate-700 rounded-xl p-3 h-24 overflow-y-auto text-emerald-400 font-mono text-sm break-all mb-4">
                    Waiting for signal...
                </div>
                <button id="rxBtn" onclick="toggleReceiver()" class="mt-auto bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition-all">
                    Start Listening
                </button>
            </section>
        </div>
    </main>

    <footer id="status" class="mt-10 text-xs text-slate-600 font-mono uppercase tracking-widest text-center">
        Engine Offline
    </footer>

    <script>
        window.AudioContext = window.AudioContext || window.webkitAudioContext;

        let ggwaveModule = null;
        let ggwaveInstance = null;
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let mediaSource = null;
        let recorder = null;
        let isListening = false;

        const txData = document.getElementById('txData');
        const protocolSelect = document.getElementById('protocolSelect');
        const rxOutput = document.getElementById('rxOutput');
        const txBtn = document.getElementById('txBtn');
        const rxBtn = document.getElementById('rxBtn');

        function setStatus(text) {
            document.getElementById('status').innerText = text;
        }

        function convertTypedArray(src, Type) {
            const buffer = new ArrayBuffer(src.byteLength);
            new src.constructor(buffer).set(src);
            return new Type(buffer);
        }

        const ggwaveReady = ggwave_factory({
            locateFile: (path) => path.endsWith('.wasm')
                ? 'https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.wasm'
                : path
        }).then((obj) => {
            ggwaveModule = obj;
            setStatus('Tap Send or Start Listening to initialize audio');
        }).catch((error) => {
            setStatus(`Engine load failed: ${error.message}`);
            throw error;
        });

        async function initEngine() {
            await ggwaveReady;

            if (!audioCtx) {
                audioCtx = new AudioContext({ sampleRate: 48000 });
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.75;
                drawSpectrum();
            }

            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            if (!ggwaveInstance) {
                const parameters = ggwaveModule.getDefaultParameters();
                parameters.sampleRateInp = audioCtx.sampleRate;
                parameters.sampleRateOut = audioCtx.sampleRate;
                ggwaveInstance = ggwaveModule.init(parameters);
            }

            setStatus(`Engine Ready @ ${audioCtx.sampleRate} Hz`);
        }

        async function onSend() {
            txBtn.disabled = true;

            try {
                await initEngine();

                const text = txData.value.trim();
                if (!text) {
                    setStatus('Enter a short message first');
                    return;
                }

                const protocolId = parseInt(protocolSelect.value, 10);
                const waveform = ggwaveModule.encode(ggwaveInstance, text, protocolId, 10);
                const samples = convertTypedArray(waveform, Float32Array);
                const buffer = audioCtx.createBuffer(1, samples.length, audioCtx.sampleRate);
                buffer.getChannelData(0).set(samples);

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.connect(analyser);
                source.start(0);

                setStatus(`Broadcasting with protocol ${protocolId}...`);
                source.onended = () => setStatus('Pulse sent');
            } catch (error) {
                setStatus(`Send failed: ${error.message}`);
            } finally {
                txBtn.disabled = false;
            }
        }

        async function toggleReceiver() {
            if (isListening) {
                stopReceiver();
                return;
            }

            if (!window.isSecureContext || !navigator.mediaDevices?.getUserMedia) {
                setStatus('Mic capture needs HTTPS or localhost');
                return;
            }

            rxBtn.disabled = true;

            try {
                await initEngine();

                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        autoGainControl: false,
                        noiseSuppression: false
                    }
                });

                mediaSource = audioCtx.createMediaStreamSource(mediaStream);
                recorder = audioCtx.createScriptProcessor(1024, 1, 1);

                recorder.onaudioprocess = (event) => {
                    const channelData = event.inputBuffer.getChannelData(0);
                    const input = convertTypedArray(new Float32Array(channelData), Int8Array);
                    const result = ggwaveModule.decode(ggwaveInstance, input);

                    if (result && result.length > 0) {
                        addMessage(new TextDecoder('utf-8').decode(result));
                    }
                };

                mediaSource.connect(analyser);
                mediaSource.connect(recorder);
                recorder.connect(audioCtx.destination);

                isListening = true;
                rxBtn.innerText = 'Stop Listening';
                rxBtn.classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
                rxBtn.classList.add('bg-red-600', 'hover:bg-red-500');
                setStatus('Listening for signal...');
            } catch (error) {
                setStatus(`Mic error: ${error.message}`);
            } finally {
                rxBtn.disabled = false;
            }
        }

        function stopReceiver() {
            if (recorder) {
                recorder.disconnect();
                recorder.onaudioprocess = null;
                recorder = null;
            }

            if (mediaSource) {
                mediaSource.disconnect();
                mediaSource = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach((track) => track.stop());
                mediaStream = null;
            }

            isListening = false;
            rxBtn.innerText = 'Start Listening';
            rxBtn.classList.remove('bg-red-600', 'hover:bg-red-500');
            rxBtn.classList.add('bg-emerald-600', 'hover:bg-emerald-500');
            setStatus('Receiver stopped');
        }

        function addMessage(text) {
            if (rxOutput.innerText.includes('Waiting for signal...')) {
                rxOutput.textContent = '';
            }

            const row = document.createElement('div');
            row.className = 'mb-1 border-b border-white/5 pb-1';
            row.textContent = `> ${text}`;
            rxOutput.prepend(row);
        }

        function drawSpectrum() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');

            function render() {
                requestAnimationFrame(render);

                if (!analyser) return;

                const width = Math.max(1, Math.floor(canvas.clientWidth));
                const height = Math.max(1, Math.floor(canvas.clientHeight));

                if (canvas.width !== width || canvas.height !== height) {
                    canvas.width = width;
                    canvas.height = height;
                }

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height;
                    const r = 34;
                    const g = i > bufferLength * 0.7 ? 211 : 100;
                    const b = 238;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }

            render();
        }

        setStatus('Loading modem...');
    </script>
</body>
</html>
