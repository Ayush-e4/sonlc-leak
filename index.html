<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Link | The Real Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.js"></script>
</head>
<body class="bg-[#0b0f1a] text-slate-200 min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="max-w-md w-full space-y-6">
        <div class="text-center">
            <h1 class="text-4xl font-black text-cyan-400 tracking-tighter">SONIC LINK</h1>
            <p id="engineStatus" class="text-[10px] font-mono text-rose-500 mt-2 uppercase font-bold tracking-widest">Engine Offline</p>
        </div>

        <div id="debugLog" class="bg-black/60 border border-slate-800 rounded-xl p-3 h-28 overflow-y-auto text-[10px] font-mono text-slate-500">
            <div>[System] Booting WASM Environment...</div>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl">
                <input id="txData" type="text" value="Hello Sonic" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm mb-4 outline-none focus:border-cyan-500 text-white">
                <button onclick="onSend()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all active:scale-95">
                    Broadcast Silently
                </button>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl">
                <div id="rxOutput" class="bg-black/40 rounded-lg p-4 h-20 mb-4 text-emerald-400 font-mono text-sm flex items-center justify-center italic border border-slate-800 break-all">
                    Standing by...
                </div>
                <button id="rxBtn" onclick="toggleReceiver()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition-all active:scale-95">
                    Start Listening
                </button>
            </div>
        </div>
    </div>

    <script>
        let ggwave = null;
        let ggwaveInstance = null; 
        let audioCtx = null;
        let isListening = false;

        function log(msg) {
            const container = document.getElementById('debugLog');
            const entry = document.createElement('div');
            entry.innerText = `> ${msg}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        const factoryConfig = {
            locateFile: (path) => {
                if (path.endsWith('.wasm')) {
                    return 'https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.wasm';
                }
                return path;
            }
        };

        // Initialize Engine & Create Instance
        ggwave_factory(factoryConfig).then(obj => {
            ggwave = obj;
            
            let parameters = ggwave.getDefaultParameters();
            parameters.sampleRateInp = 48000;
            parameters.sampleRateOut = 48000;
            
            ggwaveInstance = ggwave.init(parameters);

            document.getElementById('engineStatus').innerText = "📡 Engine Online";
            document.getElementById('engineStatus').classList.replace('text-rose-500', 'text-emerald-500');
            log(`WASM Ready. Instance ID: ${ggwaveInstance}`);
        }).catch(e => log("Init Error: " + e.message));

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 48000});
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        async function onSend() {
            // THE FIX: Explicitly check against null! 0 is a valid ID!
            if (ggwaveInstance === null) return log("Error: DSP Instance not running");
            await initAudio();
            
            let safeString = String(document.getElementById('txData').value).trim();
            if (safeString === "") safeString = "Hello";
            
            try {
                log(`Encoding: "${safeString}"`);

                const payload = ggwave.encode(ggwaveInstance, safeString, 4, 15);
                
                const buffer = audioCtx.createBuffer(1, payload.length, 48000);
                buffer.getChannelData(0).set(payload);

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start();
                log("✅ Pulse broadcasted!");
                
            } catch (e) {
                log("❌ Encode Error: " + e.message);
                console.error(e);
            }
        }

        async function toggleReceiver() {
            if (isListening) return location.reload(); 
            
            // THE FIX: Explicitly check against null!
            if (ggwaveInstance === null) return log("Error: DSP Instance not running");
            await initAudio();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(1024, 1, 1);

                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    
                    const result = ggwave.decode(ggwaveInstance, inputData);
                    
                    if (result && result.length > 0) {
                        let finalText = typeof result === 'string' ? result : new TextDecoder().decode(result);
                        
                        log(`🎉 DECODED: ${finalText}`);
                        document.getElementById('rxOutput').innerText = finalText;
                        document.getElementById('rxOutput').classList.remove('italic');
                    }
                };

                isListening = true;
                document.getElementById('rxBtn').innerText = "Stop Listening";
                document.getElementById('rxBtn').classList.replace('bg-emerald-600', 'bg-red-600');
                document.getElementById('rxOutput').innerText = "Scanning Air...";
                log("Mic Active. Listening...");
            } catch (err) {
                log("❌ Mic Access Denied.");
            }
        }
    </script>
</body>
</html>
