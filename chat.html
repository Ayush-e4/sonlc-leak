<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sonic Link Chat</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/gh/ggerganov/ggwave/bindings/javascript/ggwave.js" defer></script>
    <script src="shared.app.js" defer></script>
    <script src="chat.app.js" defer></script>
</head>
<body class="simple-body chat-screen">
    <main class="chat-page">
        <header class="chat-topbar">
            <div class="chat-brand">
                <p class="mini-label">Sonic Link</p>
                <h1 class="chat-title">Channel</h1>
            </div>
            <a href="index.html" class="secondary-btn link-btn">Settings</a>
        </header>

        <section class="chat-info-row">
            <div class="info-pill">
                <span class="info-key">Name</span>
                <strong id="callsignBadge">Ghost-000</strong>
            </div>
            <div class="info-pill">
                <span class="info-key">Mode</span>
                <strong id="protocolBadge">Audible Fast</strong>
            </div>
            <div class="info-pill">
                <span class="info-key">Draft</span>
                <strong id="byteMeter">0 / 140 bytes</strong>
            </div>
            <div class="info-pill" id="modeBadge">
                Live Channel
            </div>
        </section>

        <section class="chat-shell">
            <aside class="chat-side">
                <div class="simple-card side-card">
                    <div class="side-actions">
                        <button id="rxBtn" class="primary-btn">Enable Receiver</button>
                        <button id="clearBtn" class="secondary-btn">Clear Chat</button>
                    </div>
                    <p id="receiverHint" class="simple-status">Receiver idle.</p>
                </div>

                <div class="simple-card side-card">
                    <div class="canvas-head">
                        <span class="simple-label">Signal Scope</span>
                        <span id="hzDisplay" class="tiny-pill">0Hz - 24.0kHz</span>
                    </div>
                    <canvas id="visualizer" class="simple-visualizer"></canvas>
                </div>
            </aside>

            <section class="simple-card chat-card">
                <div class="chat-header-row">
                    <span class="simple-label">Messages</span>
                    <span id="messageCount" class="tiny-pill">0 packets</span>
                </div>

                <div id="chatFeed" class="simple-chat-feed">
                    <div id="emptyState" class="simple-empty">
                        No messages yet.
                    </div>
                </div>

                <div class="simple-composer">
                    <textarea id="composeInput" class="simple-input simple-textarea" maxlength="120" placeholder="Type a short message..."></textarea>
                    <div class="simple-compose-row">
                        <p id="composeHint" class="simple-status">Press Enter to transmit.</p>
                        <button id="txBtn" class="primary-btn">Transmit</button>
                    </div>
                </div>
            </section>
        </section>

        <footer id="status" class="simple-status center-status">Loading modem...</footer>
    </main>
</body>
</html>
